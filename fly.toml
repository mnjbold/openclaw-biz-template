# =============================================================
# Bold Business - OpenClaw Enterprise Multi-Agent
# Fly.io Deployment Configuration
#
# Services running inside one machine (via entrypoint.sh):
#   - OpenClaw Gateway (port 3000, main HTTP/WS endpoint)
#   - FastAPI Dashboard (port 8181, internal)
#   - Xvfb + Chromium for Computer Use capability
#   - 14+ specialist agents loaded from /data/openclaw
#
# Machine: performance-2x (4 vCPU, 8GB RAM)
# Region: sin (Singapore - closest to KL)
# Volume: 20GB persistent storage at /data
# =============================================================

app = "bold-openclaw-enterprise"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

# ---- Non-sensitive environment variables ----
[env]
  NODE_ENV = "production"
  OPENCLAW_PREFER_PNPM = "1"
  OPENCLAW_STATE_DIR = "/data/openclaw"
  NODE_OPTIONS = "--max-old-space-size=6144"
  DISPLAY = ":99"
  PYTHONUNBUFFERED = "1"
  DASHBOARD_PORT = "8181"
  GATEWAY_PORT = "3000"
  ENABLE_VNC = "false"
  CHROMIUM_FLAGS = "--no-sandbox --disable-dev-shm-usage --disable-gpu"
  OPENCLAW_MAX_AGENTS = "20"
  OPENCLAW_WORKSPACES_DIR = "/data/workspaces"
  OPENCLAW_LOG_DIR = "/data/logs"

# ---- Primary HTTP service (OpenClaw Gateway on port 3000) ----
[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 500
    soft_limit = 400

# ---- VM sizing: performance-2x = 4 vCPU, 8GB RAM ----
# Supports: 14 agents + Computer Use + Dashboard + Claude Code
[[vm]]
  size = "performance-2x"
  memory = "8192mb"

# ---- Persistent volume: 20GB ----
# Stores: openclaw state, agent workspaces, memory, logs
[mounts]
  source = "bold_openclaw_data"
  destination = "/data"
  initial_size = "20gb"

# ---- Metrics ----
[metrics]
  port = 9091
  path = "/metrics"
