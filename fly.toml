# fly.toml app configuration file generated for bold-openclaw-enterprise on 2026-05-01T19:28:49Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'bold-openclaw-enterprise'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[env]
  CHROMIUM_FLAGS = '--no-sandbox --disable-dev-shm-usage --disable-gpu'
  DASHBOARD_PORT = '8181'
  DISPLAY = ':99'
  ENABLE_VNC = 'false'
  GATEWAY_PORT = '3000'
  NODE_ENV = 'production'
  NODE_OPTIONS = '--max-old-space-size=6144'
  OPENCLAW_LOG_DIR = '/data/logs'
  OPENCLAW_MAX_AGENTS = '20'
  OPENCLAW_PREFER_PNPM = '1'
  OPENCLAW_STATE_DIR = '/data/openclaw'
  OPENCLAW_WORKSPACES_DIR = '/data/workspaces'
  PYTHONUNBUFFERED = '1'

[[mounts]]
  source = 'bold_openclaw_data'
  destination = '/data'
  initial_size = '20gb'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 500
    soft_limit = 400

[[vm]]
  size = 'performance-2x'
  memory = '8192mb'

[[metrics]]
  port = 9091
  path = '/metrics'
